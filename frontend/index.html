<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./static//css/dashboard.css" />
</head>

<body>
  <div class="app">
    <aside class="panel controls">
      <h2>Controls</h2>
      <div>
        <label>Mode</label>
        <select id="modeSelect">
          <option value="simulate">Simulate (no backend)</option>
          <option value="live">Live websocket (needs backend)</option>
        </select>
      </div>
      <div>
        <label>Filters</label>
        <div class="row">
          <label style="flex:1"><input type="checkbox" id="filterIp" checked> IP</label>
          <label style="flex:1"><input type="checkbox" id="filterTcp" checked> TCP</label>
        </div>

        <label>Suspicious IPs (comma separated)</label>
        <input id="suspiciousInput" type="text" placeholder="e.g. 10.0.0.5" />

        <label>TCP Flags to watch</label>
        <input id="flagsInput" type="text" value="SYN" />

        <div style="display:flex;gap:8px;margin-top:12px">
          <button id="startBtn">Start</button>
          <button id="stopBtn" class="ghost" disabled>Stop</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button id="clearBtn" class="ghost">Clear</button>
          <button id="exportBtn">Export</button>
        </div>
        
        <label>Packet rate (sim)</label>
        <div class="row"><input id="rateInput" type="text" value="6" style="width:70px" /> pkts/s</div>
      </div>
    </aside>

    <main class="center">
      <div class="headerBar">
        <div class="title"><h1>IDS Dashboard</h1></div>
        <div class="stats">
          <div class="stat"><small>Total</small><span id="statTotal">0</span></div>
          <div class="stat"><small>IP</small><span id="statIp">0</span></div>
          <div class="stat"><small>TCP</small><span id="statTcp">0</span></div>
          <div class="stat"><small>Alerts</small><span id="statAlerts">0</span></div>
        </div>
      </div>

      <div class="tableWrap">
        <table id="packetsTable">
          <thead>
            <tr>
              <th>Time</th><th>Src</th><th>Dst</th><th>Proto</th><th>SPort</th><th>DPort</th><th>Flags</th><th>Len</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="graphWrap">
        <canvas id="trafficChart"></canvas>
      </div>
    </main>

    <aside class="panel">
      <h2>Investigative Tools</h2>
      <div class="toolsGrid">
        <button id="btnWhois" class="ghost">Whois</button>
        <button id="btnTrace" class="ghost">Trace</button>
        <button id="btnBan" style="background:var(--bad); color:white;">Block IP</button>
        <button id="btnPcap" class="ghost">PCAP</button>
      </div>

      <h2>Recent Alerts</h2>
      <div id="alertsList" class="alertsList"></div>
      
      <h2 style="margin-top:12px">Packet Details</h2>
      <div id="detailBox">Select a packet to view details...</div>
    </aside>
  </div>

  <footer>Built for demo — shows IP and TCP detection.</footer>

  <script src="./static/js/dashboard.js"></script>
</body>
</html>
